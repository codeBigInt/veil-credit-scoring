services:
  proof-server:
    image: 'midnightntwrk/proof-server:8.0.3 '
    command: ['midnight-proof-server', '-v']
    ports:
      - '6300:6300'
    environment:
      RUST_BACKTRACE: 'full'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:6300/version']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
  
